<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة العائلة - K-wqq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .intro-title { font-size: 2.5em; margin-bottom: 15px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-container { background: rgba(255, 255, 255, 0.2); padding: 25px; border-radius: 15px; margin-top: 20px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .option-btn { background: rgba(255, 255, 255, 0.2); border: 1px solid white; color: white; padding: 15px; border-radius: 10px; cursor: pointer; }
        .option-btn:hover { background: rgba(255, 255, 255, 0.4); }
        .btn-main { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; padding: 15px 30px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2em; }
        .hidden { display: none !important; }
        #timer-display { font-size: 1.5em; color: #fee140; font-weight: bold; }
        .rights { font-size: 11px; margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="glass-container">
        <div id="intro-screen">
            <h1 class="intro-title">🎮 تحدي العائلة</h1>
            <p>لعبة الـ 20 بطاقة الممتعة</p>
            <button class="btn-main" onclick="startGame()">🚀 ابدأ اللعبة</button>
            <div class="rights">هذه القصيدة لي ولكحيلان وأسند حقوقها عليها لكي لا تنسب لأحد</div>
        </div>

        <div id="game-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>النقاط: <span id="score-display">0</span></span>
                <span id="timer-display">30ث</span>
                <span>البطاقة: <span id="card-counter">1/20</span></span>
            </div>
            <div class="card-container">
                <h2 id="card-type" style="color:#f093fb">لغز</h2>
                <p id="question-text" style="font-size:1.3em; margin:15px 0;">جاري التحميل...</p>
                <div class="options-container" id="options-container"></div>
            </div>
        </div>

        <div id="game-over" class="hidden">
            <h1 class="intro-title">انتهى التحدي!</h1>
            <p style="font-size:1.5em">نقاطك النهائية: <span id="final-score">0</span></p>
            <button class="btn-main" onclick="location.reload()">🔄 العب مرة أخرى</button>
        </div>
    </div>

    <script>
        const cards = [
            { type: "لغز", question: "أمتلك مدناً لكن بلا منازل، وغابات لكن بلا أشجار. ما أنا؟", options: ["خريطة", "حلم", "لوحة", "كتاب"], correct: 0 },
            { type: "لغز", question: "ما الذي يزداد بللاً كلما جف؟", options: ["المنشفة", "البحر", "النهر", "السحاب"], correct: 0 },
            { type: "تحدي بدني", question: "قم بـ 10 تمارين ضغط الآن!", options: ["تم التنفيذ", "تخطي"], correct: 0 },
            { type: "ديني", question: "ما هي أطول سورة في القرآن؟", options: ["البقرة", "النساء", "آل عمران", "يس"], correct: 0 },
            { type: "لغز", question: "له أسنان ولا يعض، فما هو؟", options: ["المشط", "المقص", "المنشار", "المفتاح"], correct: 0 },
            { type: "تحدي حركي", question: "قف على رجل واحدة لمدة 20 ثانية", options: ["نجحت", "فشلت"], correct: 0 },
            { type: "ديني", question: "كم عدد أركان الإسلام؟", options: ["5", "4", "6", "3"], correct: 0 },
            { type: "لغز", question: "ينبض بلا قلب، فما هو؟", options: ["الساعة", "البحر", "الكهرباء", "العمر"], correct: 0 },
            { type: "تحدي", question: "قل 'خمس خشبات' 5 مرات بسرعة", options: ["تمت", "تعثرت"], correct: 0 },
            { type: "لغز", question: "كلما أخذت منه كبر، فما هو؟", options: ["الحفرة", "البحر", "العلم", "العمر"], correct: 0 },
            { type: "ديني", question: "من هو أبو البشر؟", options: ["آدم", "نوح", "إبراهيم", "موسى"], correct: 0 },
            { type: "تحدي حركي", question: "المس أنفك بلسانك!", options: ["نجحت", "مستحيل!"], correct: 0 },
            { type: "لغز", question: "يمشي بلا أرجل ويدخل الأذن؟", options: ["الصوت", "الهواء", "النمل", "الماء"], correct: 0 },
            { type: "ديني", question: "أين ولد النبي محمد ﷺ؟", options: ["مكة", "المدينة", "الطائف", "جدة"], correct: 0 },
            { type: "تحدي", question: "قم بتقليد صوت حيوان يختاره الجمهور", options: ["تم", "تخطي"], correct: 0 },
            { type: "لغز", question: "يسير أمامك ولا تراه؟", options: ["المستقبل", "الهواء", "الظلام", "الصوت"], correct: 0 },
            { type: "ديني", question: "ما هو الركن الثاني في الإسلام؟", options: ["الصلاة", "الزكاة", "الصوم", "الحج"], correct: 0 },
            { type: "تحدي حركي", question: "اقفز 10 مرات في مكانك", options: ["تم", "تخطي"], correct: 0 },
            { type: "لغز", question: "يوجد في وسط باريس؟", options: ["حرف الراء", "برج إيفل", "السياح", "المطاعم"], correct: 0 },
            { type: "تخطي", question: "🎫 بطاقة الحظ: خذ 50 نقطة مجاناً!", options: ["شكراً!", "هات النقاط"], correct: 0 }
        ];

        let currentCard = 0;
        let score = 0;
        let timer;
        let timeLeft = 30;

        function startGame() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadCard();
            startTimer();
        }

        function loadCard() {
            if (currentCard >= cards.length) return endGame();
            
            const card = cards[currentCard];
            document.getElementById('card-type').innerText = card.type;
            document.getElementById('question-text').innerText = card.question;
            document.getElementById('card-counter').innerText = `${currentCard + 1}/20`;
            
            const optionsArea = document.getElementById('options-container');
            optionsArea.innerHTML = '';
            
            card.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsArea.appendChild(btn);
            });
            timeLeft = 30;
        }

        function checkAnswer(idx) {
            if (idx === cards[currentCard].correct) {
                score += 10;
                document.getElementById('score-display').innerText = score;
            }
            currentCard++;
            loadCard();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft + "ث";
                if (timeLeft <= 0) {
                    currentCard++;
                    loadCard();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
